name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Recreate Android project with fixed package
        run: |
          rm -rf android
          flutter create --platforms android --org com.example --project-name debt_pal_arabic_v1 .

      - name: Force package name and minimum SDK
        run: |
          if [ -f android/app/build.gradle ]; then
            sed -i 's/applicationId ".*"/applicationId "com.example.debt_pal_arabic_v1"/g' android/app/build.gradle
            sed -i 's/namespace ".*"/namespace "com.example.debt_pal_arabic_v1"/g' android/app/build.gradle
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
            sed -i 's/minSdkVersion [0-9][0-9]*/minSdkVersion 21/g' android/app/build.gradle
          fi

          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/applicationId = ".*"/applicationId = "com.example.debt_pal_arabic_v1"/g' android/app/build.gradle.kts
            sed -i 's/namespace = ".*"/namespace = "com.example.debt_pal_arabic_v1"/g' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle.kts
            sed -i 's/minSdk = [0-9][0-9]*/minSdk = 21/g' android/app/build.gradle.kts
          fi

          grep -R "applicationId\\|namespace" android/app || true

      - name: Write Android Manifest
        run: |
          cat > android/app/src/main/AndroidManifest.xml <<EOF
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <application
                  android:label="دفتر الديون"
                  android:name="\${applicationName}"
                  android:icon="@mipmap/ic_launcher">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">

                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <meta-data
                      android:name="com.google.android.gms.ads.APPLICATION_ID"
                      android:value="ca-app-pub-3082968903080396~4635521214" />

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Get packages
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare direct APK
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/debt-pal-arabic-v1-fix17-package-fixed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debt-pal-arabic-v1-fix17-package-fixed-apk
          path: apk/debt-pal-arabic-v1-fix17-package-fixed.apk
