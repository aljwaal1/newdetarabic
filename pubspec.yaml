name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Android project files
        run: flutter create --platforms android .

      - name: Set minimum SDK to 21
        run: |
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle || true
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle.kts || true

      - name: Write Android Manifest
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
        run: |
          APP_ID="${ADMOB_APP_ID:-ca-app-pub-3940256099942544~3347511713}"
          cat > android/app/src/main/AndroidManifest.xml <<EOF
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application android:label="دفتر الديون" android:name="\${applicationName}" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:taskAffinity="" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="$APP_ID" />
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Get packages
        run: flutter pub get

      - name: Build release APK
        env:
          ADMOB_BANNER_UNIT_ID: ${{ secrets.ADMOB_BANNER_UNIT_ID }}
        run: |
          BANNER_ID="${ADMOB_BANNER_UNIT_ID:-ca-app-pub-3940256099942544/6300978111}"
          flutter build apk --release --dart-define=ADMOB_BANNER_UNIT_ID="$BANNER_ID"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debt-pal-arabic-v1-fix7-admob-banner-apk
          path: build/app/outputs/flutter-apk/app-release.apk
